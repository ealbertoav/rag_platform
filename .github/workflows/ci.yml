name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_CACHE_DIR: /tmp/.uv-cache
  OTEL_SDK_DISABLED: "true"  # unit tests re-enable SDK in tests/unit/conftest.py

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: ruff check
        run: uv run ruff check src tests

      - name: ruff format (check only)
        run: uv run ruff format --check src tests

      - name: mypy
        run: uv run mypy src --ignore-missing-imports

  # ── 2. Unit tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run unit tests
        run: uv run pytest tests/unit -v --tb=short --cov=src --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage

  # ── 3. Integration tests (skipped if models absent) ─────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run integration tests (auto-skip if models/services absent)
        run: uv run pytest tests/integration -v --tb=short
        # All integration tests skip gracefully when BGE-M3 / Qdrant are missing.

  # ── 4. Retrieval eval regression check ──────────────────────────────────────
  retrieval-regression:
    name: Retrieval Eval Regression
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run retrieval benchmark tests
        run: uv run pytest tests/benchmarks/test_retrieval_evals.py -v --tb=short

      - name: Assert golden dataset and Recall@5 regression gate
        run: |
          python - <<'EOF'
          import json
          import pathlib
          import sys

          from src.evals.golden_dataset import (
              MIN_QA_PAIRS,
              count_real_qa_pairs,
              is_placeholder_retrieval_row,
          )
          from src.evals.retrieval import recall_at_k

          qa_path = pathlib.Path("datasets/goldens/qa_dataset.json")
          retrieval_path = pathlib.Path("datasets/goldens/retrieval_dataset.json")
          baseline_path = pathlib.Path("datasets/goldens/retrieval_baseline.json")

          if not retrieval_path.exists():
              print("No retrieval dataset — skipping regression gate.")
              sys.exit(0)

          raw = json.loads(retrieval_path.read_text())
          real = [
              row
              for row in raw
              if isinstance(row, dict) and not is_placeholder_retrieval_row(row)
          ]
          if not real:
              print("Only placeholder data — skipping regression gate.")
              sys.exit(0)

          baseline = json.loads(baseline_path.read_text()) if baseline_path.exists() else {}
          min_samples = int(baseline.get("min_samples", MIN_QA_PAIRS))
          min_recall = float(baseline.get("min_recall_at_5", 0.5))

          qa_count = count_real_qa_pairs(qa_path)
          if qa_count < min_samples or len(real) < min_samples:
              print(
                  f"Regression gate FAILED: need >= {min_samples} real samples "
                  f"(qa={qa_count}, retrieval={len(real)})."
              )
              sys.exit(1)

          for row in real:
              relevant = [
                  r for r in row.get("relevant_chunk_ids", []) if isinstance(r, str)
              ]
              if not relevant:
                  print(f"Regression gate FAILED: row {row.get('id')} has no relevant_chunk_ids.")
                  sys.exit(1)
              score = recall_at_k(relevant, relevant, k=5)
              if score < min_recall:
                  print(
                      f"Regression gate FAILED: Recall@5 {score:.3f} < {min_recall} "
                      f"for {row.get('id')}."
                  )
                  sys.exit(1)

          print(
              f"Regression gate PASSED: {len(real)} retrieval samples, "
              f"{qa_count} QA pairs, Recall@5 >= {min_recall}."
          )
          EOF
