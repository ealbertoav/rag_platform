name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: ruff check
        run: uv run ruff check src tests

      - name: ruff format (check only)
        run: uv run ruff format --check src tests

      - name: mypy
        run: uv run mypy src --ignore-missing-imports

  # ── 2. Unit tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run unit tests
        run: uv run pytest tests/unit -v --tb=short --cov=src --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage

  # ── 3. Integration tests (skipped if models absent) ─────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run integration tests (auto-skip if models/services absent)
        run: uv run pytest tests/integration -v --tb=short
        # All integration tests skip gracefully when BGE-M3 / Qdrant are missing.

  # ── 4. Retrieval eval regression check ──────────────────────────────────────
  retrieval-regression:
    name: Retrieval Eval Regression
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run retrieval benchmark tests
        # Skipped automatically when goldens/retrieval_dataset.json has only
        # the placeholder row (default state before documents are ingested).
        run: uv run pytest tests/benchmarks/test_retrieval_evals.py -v --tb=short

      - name: Assert Recall@5 above threshold
        # Only runs if the benchmark produced real results (non-placeholder data).
        run: |
          python - <<'EOF'
          import json, pathlib, sys
          path = pathlib.Path("datasets/goldens/retrieval_dataset.json")
          if not path.exists():
              print("No retrieval dataset — skipping regression gate.")
              sys.exit(0)
          data = json.loads(path.read_text())
          real = [d for d in data if not all(
              str(r).startswith("chunk_id_")
              for r in d.get("relevant_chunk_ids", [])
          )]
          if not real:
              print("Only placeholder data — skipping regression gate.")
              sys.exit(0)
          # If real data exists, the benchmark job already enforces thresholds.
          print(f"Regression gate: {len(real)} real samples present.")
          EOF
