name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_CACHE_DIR: /tmp/.uv-cache
  OTEL_SDK_DISABLED: "true"  # unit tests re-enable SDK in tests/unit/conftest.py

jobs:
  # ── 1. Dependency scan ───────────────────────────────────────────────────────
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Audit dependencies for high/critical CVEs
        run: ./scripts/check_dependencies.sh

  # ── 2. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: ruff check
        run: uv run ruff check src tests

      - name: ruff format (check only)
        run: uv run ruff format --check src tests

      - name: mypy
        run: uv run mypy src

      - name: basedpyright
        run: uv run basedpyright --level error src

  # ── 3. Unit tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [dependency-scan, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run unit tests
        run: uv run pytest tests/unit -v --tb=short --cov=src --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage

  # ── 4. Integration tests (skipped if models absent) ─────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run integration tests (auto-skip if models/services absent)
        run: uv run pytest tests/integration -v --tb=short
        # All integration tests skip gracefully when BGE-M3 / Qdrant are missing.

  # ── 5. Retrieval eval regression check ──────────────────────────────────────
  retrieval-regression:
    name: Retrieval Eval Regression
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Run retrieval benchmark tests
        run: uv run pytest tests/benchmarks/test_retrieval_evals.py -v --tb=short

      - name: Assert golden dataset and Recall@5 regression gate
        run: uv run python scripts/check_regression_gate.py
