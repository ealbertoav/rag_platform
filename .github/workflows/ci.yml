name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "specs/**"
      - "data/exports/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "specs/**"
      - "data/exports/**"
  workflow_dispatch:
    inputs:
      run_slow:
        description: Include slow unit tests (100K BM25 scale)
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_CACHE_DIR: /tmp/.uv-cache
  OTEL_SDK_DISABLED: "true"  # unit tests re-enable SDK in tests/unit/conftest.py

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      quality: ${{ steps.filter.outputs.quality }}
      unit: ${{ steps.filter.outputs.unit }}
      extended: ${{ steps.filter.outputs.extended }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            quality:
              - 'src/**'
              - 'tests/**'
              - 'scripts/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'configs/**'
              - '.github/**'
            unit:
              - 'src/**'
              - 'tests/**'
              - 'scripts/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'configs/**'
              - '.github/**'
            extended:
              - 'src/**'
              - 'tests/integration/**'
              - 'tests/benchmarks/**'
              - 'datasets/goldens/**'
              - 'scripts/check_regression_gate.py'
              - 'scripts/run_evals.py'
              - 'scripts/check_multimodal_regression_gate.py'

  quality:
    name: Quality
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.quality == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-python-env

      - name: Audit dependencies for high/critical CVEs
        run: ./scripts/check_dependencies.sh

      - name: ruff check
        run: uv run ruff check src tests

      - name: ruff format (check only)
        run: uv run ruff format --check src tests

      - name: mypy
        run: uv run mypy src

      - name: basedpyright
        run: uv run basedpyright --level error src

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.unit == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-python-env

      - name: Run unit tests
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.run_slow }}" == "true" ]]; then
            uv run pytest tests/unit -n auto --cov=src --cov-report=xml -v --tb=short
          else
            uv run pytest tests/unit -m "not slow" -n auto --cov=src --cov-report=xml -v --tb=short
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            .coverage
            coverage.xml

  extended-tests:
    name: Extended Tests
    runs-on: ubuntu-latest
    needs: [changes, unit-tests]
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.extended == 'true') &&
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-python-env

      - name: Run integration tests (auto-skip if models/services absent)
        run: uv run pytest tests/integration -v --tb=short

      - name: Run retrieval benchmark tests
        run: uv run pytest tests/benchmarks/test_retrieval_evals.py -v --tb=short

      - name: Assert golden dataset and Recall@5 regression gate
        run: uv run python scripts/check_regression_gate.py

      - name: Assert multimodal (table/figure) regression gate (optional, T-282)
        continue-on-error: true
        run: uv run python scripts/check_multimodal_regression_gate.py
