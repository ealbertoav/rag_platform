embeddings:
  provider: bge_m3            # bge_m3 | nomic | qwen_embedding | clip | openai | voyage | cohere | gemini | nvidia_nim
  model_path: models/embeddings/bge-m3
  batch_size: 32
  device: mps                 # mps | cuda | cpu
  normalize: true
  dense_dim: 1024
  sparse_dim: 30522           # BGE-M3 lexical output; 0 for dense-only providers

  # clip (T-251): self-hosted CLIP (default model_path: sentence-transformers/clip-ViT-B-32,
  # 512-dim); embed() and embed_image() share the same space for cross-modal search.

  # ── API provider model names (credentials go in .env — never commit keys here) ─
  # Set EMBEDDINGS__<PROVIDER>__API_KEY in .env to activate an API provider.

  openai:
    model: text-embedding-3-large
    dimensions: 3072          # text-embedding-3 supports truncation via this param

  voyage:
    model: voyage-large-2     # voyage-code-2 is optimized for code/technical docs
    dimensions: 1536
    multimodal_model: voyage-multimodal-3  # used by embed_image() (T-251)
    multimodal_dimensions: 1024  # voyage-multimodal-3 output dim; sizes Qdrant's image_dense (T-252)

  cohere:
    model: embed-english-v3.0 # embed-multilingual-v3.0 for mixed-language corpora
    dimensions: 1024

  gemini:
    model: text-embedding-004
    dimensions: 768

  nvidia_nim:
    model: nvidia/llama-nemotron-embed-1b-v2  # low-latency embedqa NIM (ADR-0003); predecessor EOL 2026-05-18
    base_url: https://integrate.api.nvidia.com/v1
    dimensions: 2048          # see NvidiaNIMEmbeddingConfig in src/core/settings.py for caveats

  # ── Redis embedding cache ────────────────────────────────────────────────────
  # Recommended for API providers to avoid redundant paid calls on embed()/embed_passage()
  # (indexing-time). Does NOT help embed_query() latency — that path is never cached
  # by design (see CachedEmbeddingProvider; ADR-0003's #79 correction).
  # Set EMBEDDINGS__CACHE__ENABLED=true in .env to activate.
  cache:
    enabled: false
    ttl_seconds: 604800       # 7 days
