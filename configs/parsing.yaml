parsing:
  layout_parser:
    enabled: false              # T-200 DoclingLayoutParser; off by default (plain loaders)
    provider: docling           # docling (install separately: uv pip install docling)
    # When enabled, .pdf and .docx route through DoclingLayoutParser → ParsedDocument
    # before chunking. Metadata includes sections, tables (table_id), and figures
    # (figure_id, bbox, page) for downstream multimodal chunking (T-202+).
  # .pptx uses PptxLoader (T-201) — plain text from slide titles and shapes;
  # not routed through the layout parser unless extended in a future phase.
  # T-210 multimodal domain model (no feature flag): Chunk.modality / image_embedding /
  # asset_path, Answer.source_references, and SourceReference — see README.
  ocr:
    enabled: false              # T-220/T-223 get_ocr_provider() + scanned-PDF fallback; off by default
    provider: tesseract         # tesseract | easyocr | docling | azure_di
    min_chars: 50               # OCR when extractable text is below this many chars
    # Factory returns None when disabled. Self-hosted engines (tesseract /
    # easyocr / docling) are Docling-backed (T-221; requires: uv pip install docling).
    # tesseract → Tesseract CLI; easyocr → EasyOCR; docling → auto engine pick.
    # azure_di is T-222. get_ocr_provider() raises ConfigurationError for azure_di
    # until T-222; apply_ocr_fallback logs and keeps extractable text instead of
    # aborting ingest. Born-digital / mixed PDFs skip OCR before provider init.
    # Re-ingest after enabling to recover scanned PDFs.
  table_chunks:
    enabled: false              # T-202 structured type=table chunks at ingest; off by default
    # Requires layout metadata (tables with table_id) from T-200 Docling parser.
    # Re-ingest after enabling — unchanged documents backfill missing table chunks.
