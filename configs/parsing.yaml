parsing:
  layout_parser:
    enabled: false              # T-200 DoclingLayoutParser; off by default (plain loaders)
    provider: docling           # docling (install separately: uv pip install docling)
    # When enabled, .pdf and .docx route through DoclingLayoutParser → ParsedDocument
    # before chunking. Metadata includes sections, tables (table_id), and figures
    # (figure_id, bbox, page) for downstream multimodal chunking (T-202+).
  # .pptx uses PptxLoader (T-201) — plain text from slide titles and shapes;
  # not routed through the layout parser unless extended in a future phase.
  # T-210 multimodal domain model (no feature flag): Chunk.modality / image_embedding /
  # asset_path, Answer.source_references, and SourceReference — see README.
  # T-250 (no feature flag): EmbeddingRepository.embed_image() — capability probe,
  # not config-driven. Default raises EmbeddingError; only multimodal providers
  # (CLIP / Voyage-multimodal, T-251) override it.
  # T-251 (no feature flag): ClipEmbeddingProvider (embeddings.provider: clip) and
  # VoyageEmbeddingProvider.embed_image() (embeddings.voyage.multimodal_model) both
  # implement embed_image() from T-250 — each encodes images into the same space
  # as its own embed(), enabling cross-modal similarity search.
  # T-252 (no feature flag): QdrantVectorStore adds an optional image_dense named
  # vector, sized via provider_image_dim() — present only when embeddings.provider
  # is clip/voyage (MULTIMODAL_EMBEDDING_PROVIDERS); other providers keep the
  # original dense+sparse-only schema. Existing collections gaining a multimodal
  # provider need scripts/migrate_qdrant_image_dense.py (Qdrant cannot add a named
  # vector in place, so it rebuilds the collection and restores existing points).
  # T-260 (no feature flag): ImageDenseRetriever (src/rag/retrieval/image_dense_retriever.py)
  # embeds a text query and searches the image_dense named vector via
  # QdrantVectorStore.search_image_dense(). `.enabled` mirrors image_dense_dim —
  # retrieve() returns [] instead of raising when the active provider has no image
  # space, so callers can wire it unconditionally.
  # T-261 (no feature flag): HybridRetriever gained an `image_retriever` RRF leg
  # (RetrievalPipeline.from_settings() wires ImageDenseRetriever in automatically).
  # It runs unconditionally alongside dense/BM25; on a non-multimodal provider it
  # always returns [] (T-260's `.enabled` gate) so fusion output is unchanged.
  # T-262 (reranker.modality_boost, default 0.0 — disabled): CrossEncoder adds
  # this value to the cross-encoder score of table/caption chunks before the
  # final sort, since cross-encoders trained on prose pairs tend to under-score
  # structured content. Also adds `reranker.provider: qwen_reranker`
  # (QwenRerankerProvider, src/infrastructure/rerankers/qwen_reranker.py) as an
  # alternative to bge_reranker — Qwen/Qwen3-Reranker-0.6B via
  # sentence-transformers' CrossEncoder, which auto-detects the causal-LM
  # architecture and appends a LogitScore head. See configs/retrieval.yaml
  # `reranker.*`.
  ocr:
    enabled: false              # T-220/T-223 get_ocr_provider() + scanned-PDF fallback; off by default
    provider: tesseract         # tesseract | easyocr | docling | azure_di
    min_chars: 50               # OCR when extractable text is below this many non-whitespace chars
    # Factory returns None when disabled. Self-hosted engines (tesseract /
    # easyocr / docling) are Docling-backed (T-221; requires: uv pip install docling).
    # tesseract → Tesseract CLI; easyocr → EasyOCR; docling → auto engine pick.
    # azure_di → Azure Document Intelligence REST API (T-222; see docs/ocr-providers.md).
    # Missing Azure DI credentials raise ConfigurationError; apply_ocr_fallback
    # logs and keeps extractable text instead of aborting ingest.
    # Born-digital / mixed PDFs skip OCR before the provider init.
    # Dedup matches text content_hash or PDF source_file_hash so toggling
    # enabled/min_chars does not wipe OCR chunks or force re-OCR. Empty scans
    # ingested without OCR still re-run after enabling (text-hash + empty).
    # Failed OCR stores a pending hash so the next ingest retries.
    azure_di:
      endpoint: ""              # e.g. https://<resource>.cognitiveservices.azure.com
      api_key: ""               # prefer PARSING__OCR__AZURE_DI__API_KEY
      api_version: "2024-11-30"
      model_id: prebuilt-read
      timeout_seconds: 120
      poll_interval_seconds: 1
  table_chunks:
    enabled: false              # T-202 structured type=table chunks at ingesting; off by default
    # Requires layout metadata (tables with table_id) from T-200 Docling parser.
    # Re-ingest after enabling — unchanged documents backfill missing table chunks.
  caption_chunks:
    enabled: false              # T-232 structured type=caption chunks at ingesting; off by default
    # Requires figures[].caption (T-231 VLM or layout caption) linked via figure_id.
    # Re-ingest after enabling — unchanged documents backfill missing caption chunks.
    # T-243 (no feature flag): which chunk `type`s land in Qdrant vs BM25 is
    # centralized in src/rag/ingestion/chunk_type_registry.py — hype_question
    # and summary chunks are dense-only; table/caption/synthetic/detail/proposition
    # chunks (and any unrecognized type) index to both, matching prior behavior.
  figure_assets:
    enabled: false              # T-230 persist figure bytes + asset_path / figure_id; off by default
    store_dir: data/assets      # local asset root (gitignored); env: PARSING__FIGURE_ASSETS__STORE_DIR
    # Extracts figures from layout figures[] (Docling PDF/DOCX) or PPTX picture
    # shapes, writes PNG/JPEG bytes under store_dir, and sets figures[].asset_path
    # plus Chunk.asset_path / figure_id via build_figure_chunks(). Soft-fails per
    # figure when bytes cannot be exported.
  figure_captions:
    enabled: false              # T-231 VLM captions for stored figure assets; off by default
    provider: openai            # openai | gemini
    # Requires figures[].asset_path from T-230. Writes figures[].caption via
    # apply_figure_captions() after apply_figure_assets(), and persists each
    # successful caption next to the asset as {stem}.caption.txt bound to the
    # asset SHA-256 so skip-path re-ingests reload without re-calling the VLM
    # while overwritten assets cannot reuse a stale caption. Soft-fails when the
    # VLM is unavailable or a single figure fails. Install: uv sync --extra api-embeddings
    # Indexing type=caption chunks is parsing.caption_chunks (T-232).
    openai:
      api_key: ""               # prefer PARSING__FIGURE_CAPTIONS__OPENAI__API_KEY
      model: gpt-4o-mini
    gemini:
      api_key: ""               # prefer PARSING__FIGURE_CAPTIONS__GEMINI__API_KEY
      model: gemini-2.0-flash
  figure_chunks:
    enabled: false              # T-253 structured type=figure chunks at ingesting; off by default
    # Requires figures[].asset_path from T-230. FigureChunker text-embeds each
    # figure (caption if present, else a "[figure]" placeholder) via embed_both(),
    # then attaches Chunk.image_embedding via EmbeddingRepository.embed_image()
    # on asset_path when the active provider supports it (embeddings.provider:
    # clip/voyage — MULTIMODAL_EMBEDDING_PROVIDERS, T-250/T-251). Non-multimodal
    # providers soft-fail the image step and keep the text-only chunk — no error,
    # no image_dense point. Qdrant only writes image_dense when both the chunk
    # carries image_embedding and the collection was created with that named
    # vector (T-252). Re-ingest after enabling — unchanged documents backfill
    # missing figure chunks the same way table_chunks/caption_chunks do.
