app:
  name: rag-platform
  version: "0.1.0"
  description: "Local enterprise RAG platform"

api:
  host: "0.0.0.0"
  port: 8000
  reload: true
  cors_origins: ["*"]
  api_key: ""                    # set + send X-API-Key header to protect /ingest, /chat, /evals
  max_upload_bytes: 10485760     # 10 MiB upload cap for POST /ingest/upload
  ingest_allowed_roots:
    - data/raw                   # POST /ingest/path may only read under these directories
  rate_limit:
    enabled: false               # T-160 / T-146 — protect /ingest, /chat, /evals/run, /feedback
    requests_per_minute: 60
    burst: 10
