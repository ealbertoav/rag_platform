evals:
  dataset_path: datasets/goldens/qa_dataset.json
  retrieval_dataset_path: datasets/goldens/retrieval_dataset.json
  retrieval_baseline_path: datasets/goldens/retrieval_baseline.json
  synthetic_dataset_path: datasets/synthetic/generated_qa.json
  min_qa_pairs: 20

  retrieval:
    recall_k: [1, 3, 5, 10]
    precision_k: [3, 5]
    regression:
      min_recall_at_5: 0.5

  generation:
    faithfulness_threshold: 0.8
    relevance_threshold: 0.75
    hallucination_threshold: 0.1

  tools:
    ragas: true
    deepeval: true

  technique_benchmark:
    configs:
      - name: baseline
        description: No optional RAG techniques enabled
        overrides: {}
      - name: multi_query
        description: Multi-query expansion (query_expansion.enabled)
        overrides:
          QUERY_EXPANSION__ENABLED: "true"
          QUERY_EXPANSION__N_VARIANTS: "3"
      - name: hyde
        description: Hypothetical document embeddings at query time
        overrides:
          RETRIEVAL__HYDE__ENABLED: "true"
      - name: cch
        description: Contextual compression before generation
        overrides:
          COMPRESSION__ENABLED: "true"
      - name: reliable_rag
        description: LLM relevancy grading after rerank
        overrides:
          QUALITY__RELIABLE_RAG__ENABLED: "true"
      - name: self_rag
        description: Self-RAG retrieve/support/utility gates in agent pipeline
        overrides:
          QUALITY__SELF_RAG__ENABLED: "true"
      - name: feedback_loop
        description: User feedback RRF boost (pre-seeds scores; compares boost on vs off)
        overrides: {}

  chunk_size_sweep:
    sizes: [256, 500, 768, 1024]
    weights:
      recall: 0.35
      faithfulness: 0.35
      relevance: 0.20
      latency: 0.10

  infra_benchmark:
    regression_p95_pct: 10
    concurrent_chat_count: 10
    concurrent_chat_timeout_s: 120
    bm25_fixture_chunks: 100000
    bm25_search_iterations: 20
    graph_search_iterations: 10
    streaming_sample_question: "What is retrieval augmented generation?"
    baseline_path: data/exports/infra_baseline.json
