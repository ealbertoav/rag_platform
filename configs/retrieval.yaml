chunking:
  strategy: recursive          # recursive | semantic | parent_child
  chunk_size: 500              # approximate tokens
  overlap: 50
  similarity_threshold: 0.4   # semantic chunker: distance > threshold → split
  parent_chunk_size: 1500     # parent_child chunker
  child_chunk_size: 400
  contextual_headers:
    enabled: false             # prepend doc/section/page to embedded text (T-120)
    exclude_from_llm_context: true  # use raw_text (no header) in generation context
  augmentation:
    enabled: false               # generate synthetic questions per chunk at ingest (T-121)
    n_questions: 3
  hierarchical:
    enabled: false               # document summary + detail two-tier index (T-125)
    summary_top_k: 3             # top matching documents from summary search

retrieval:
  top_k_dense: 50
  top_k_final: 5               # max chunks passed to generation after rerank/compression
  hybrid_alpha: 0.7            # weighted_linear only: 1.0 = dense, 0.0 = BM25
  hybrid_fusion: rrf             # rrf (default) | weighted_linear
  hype:
    enabled: false               # HyPE question-question matching at query time (T-122)
    n_questions: 3
  rse:
    enabled: false               # merge adjacent retrieved chunks into segments (T-123)
    max_segment_tokens: 1500
  parent_context:
    enabled: false               # expand child chunks to parent text for LLM context (T-124)

reranker:
  provider: bge_reranker
  model_path: models/rerankers/bge-reranker-v2-m3
  top_k: 10
  batch_size: 16

query_expansion:
  enabled: true
  n_variants: 3

compression:
  enabled: true
  max_tokens: 1500
