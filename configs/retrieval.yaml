chunking:
  strategy: recursive          # recursive | semantic | parent_child | proposition | section (T-240) | page (T-241)
  chunk_size: 500              # approximate tokens
  overlap: 50
  similarity_threshold: 0.4   # semantic chunker: distance > threshold → split
  parent_chunk_size: 1500     # parent_child chunker
  child_chunk_size: 400
  contextual_headers:
    enabled: false             # prepend doc/section/page to embedded text (T-120)
    exclude_from_llm_context: true  # use raw_text (no header) in generation context
  augmentation:
    enabled: false               # generate synthetic questions per chunk at ingest (T-121)
    n_questions: 3
  hierarchical:
    enabled: false               # document summary + detail two-tier index (T-125)
    summary_top_k: 3             # top matching documents from summary search
  proposition:
    quality_threshold: 7           # min LLM score (1-10) per accuracy/clarity/completeness/conciseness (T-126)

retrieval:
  top_k_dense: 50
  top_k_final: 5               # max chunks passed to generation after rerank/compression
  hybrid_alpha: 0.7            # weighted_linear only: 1.0 = dense, 0.0 = BM25
  hybrid_fusion: rrf             # rrf (default) | weighted_linear
  bm25:
    backend: memory              # memory (default) | disk (mmap/segmented — T-165)
    disk_path: data/processed/bm25_disk
    segment_size: 10000          # chunks per on-disk segment (disk backend)
  hype:
    enabled: false               # HyPE question-question matching at query time (T-122)
    n_questions: 3
  hyde:
    enabled: false               # hypothetical document embedding at query time (T-130)
  adaptive:
    enabled: false               # LLM query intent classification (T-131)
    strategies:                  # per-category retrieval tuning (T-132)
      factual:
        top_k: 30
        n_variants: 1
        hyde: false
        compression: true
      analytical:
        top_k: 50
        n_variants: 3
        hyde: true
        compression: true
        # pairs well with query_expansion.step_back.enabled (T-133)
      opinion:
        top_k: 20
        n_variants: 2
        hyde: false
        compression: false
      contextual:
        top_k: 40
        n_variants: 2
        hyde: false
        compression: true
  rse:
    enabled: false               # merge adjacent retrieved chunks into segments (T-123)
    max_segment_tokens: 1500
  parent_context:
    enabled: false               # expand child chunks to parent text for LLM context (T-124)
  diversity:
    enabled: false               # MMR diversity re-ranking after cross-encoder (T-135)
    lambda: 0.7                  # 1.0 = pure relevance, 0.0 = max diversity

reranker:
  provider: bge_reranker
  model_path: models/rerankers/bge-reranker-v2-m3
  top_k: 10
  batch_size: 16

query_expansion:
  enabled: true
  n_variants: 3
  step_back:
    enabled: false             # broader background query for multi-query RRF fusion (T-133)

compression:
  enabled: true
  max_tokens: 1500

quality:
  reliable_rag:
    enabled: false               # LLM relevancy grading after rerank (T-140)
    min_score: 0.5               # chunks below this score are excluded from context
  self_rag:
    enabled: false               # Self-RAG retrieve/support/utility gates in agent (T-141)
  crag:
    enabled: false               # Corrective RAG web search fallback in chat pipeline (T-142)
    lower_threshold: 0.3         # below → discard retrieval, web search only
    upper_threshold: 0.7         # above → use retrieved context as-is
  source_highlighting:
    enabled: false               # T-144 post-generation span extraction on /chat/full
  feedback_loop:
    enabled: false               # user relevance feedback + RRF boost (T-145)
    boost_multiplier: 0.05       # additive RRF boost per unit of positive feedback_score
    expand_candidate_pool: true  # widen fusion pool when boost can reorder results
    backend: qdrant              # qdrant | redis | postgres (T-146 multi-replica hardening)
    postgres_url: ""             # SQL feedback store path or DSN when backend=postgres
