# Full local stack for the RAG platform.
# Prerequisites: copy .env.example → .env and adjust values.
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Ingest: docker compose run --rm worker python scripts/ingest.py --source /app/data/raw
# Eval corpus (#96, isolated from the above — see `make ingest-eval-corpus`).
# datasets/ isn't bind-mounted into the worker by default; add it for this one-off run:
#   docker compose run --rm -v ./datasets:/app/datasets \
#     -e QDRANT__COLLECTION=rag_documents_eval -e RETRIEVAL__BM25__BACKEND=disk \
#     -e RETRIEVAL__BM25__DISK_PATH=/app/data/processed/bm25_eval \
#     worker python scripts/ingest.py --source /app/datasets/goldens/rag_platform_corpus.md

services:

  # ── Infrastructure ───────────────────────────────────────────────────────

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST + gRPC
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # qdrant/qdrant:latest dropped curl; use bash's /dev/tcp to probe the port instead.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Trace UI for otel-collector's traces pipeline (#109). Only the UI port is
  # exposed to the host — Jaeger's own OTLP receiver stays internal to the
  # Docker network (otel-collector reaches it at jaeger:4317) since 4317/4318
  # are already mapped to otel-collector on the host.
  jaeger:
    # Jaeger v2 (OTel-native, all-in-one) — v1 (jaegertracing/all-in-one) is
    # EOL upstream. v2 moved registries (cr.jaegertracing.io, not Docker Hub)
    # and its health-check extension (healthcheckv2) uses a different
    # port/path than v1's admin server — see the healthcheck below. Pinned
    # (unlike this file's other :latest infra images) since this is a fast-
    # moving new major version; 2.20.0 is what this was live-verified against.
    image: cr.jaegertracing.io/jaegertracing/jaeger:2.20.0
    ports:
      - "16686:16686"   # UI
    healthcheck:
      # Alpine/busybox — no bash (no /dev/tcp) or curl, but wget is present.
      # healthcheckv2 extension serves on 13133, not v1's admin port 14269.
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:13133/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./configs/otel-collector.yaml:/etc/otel-collector-config.yaml:ro
    command: ["--config=/etc/otel-collector-config.yaml"]
    depends_on:
      jaeger:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  # ── Application ──────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override localhost URLs with Docker service names
      QDRANT__URL: http://qdrant:6333
      LOGGING__OTEL_ENDPOINT: http://otel-collector:4317
      # Metal/MPS is unavailable inside Docker on macOS; use CPU
      EMBEDDINGS__DEVICE: cpu
      # Disable hot-reload in containerized mode; see docker-compose.override.yml for dev
      API__RELOAD: "false"
    volumes:
      # Bind-mount so the user manages model files directly on the host
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  # ── Jobs (not started by default; run with: docker compose run --rm worker) ──

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env
    environment:
      QDRANT__URL: http://qdrant:6333
      LOGGING__OTEL_ENDPOINT: http://otel-collector:4317
      EMBEDDINGS__DEVICE: cpu
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
    profiles: ["tools"]   # excluded from `docker compose up`; invoke via make docker-ingest
    restart: "no"

volumes:
  qdrant_data:
  ollama_data:
