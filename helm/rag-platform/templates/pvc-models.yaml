apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "rag-platform.fullname" . }}-models
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "rag-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: models
spec:
  accessModes:
    - {{ .Values.persistence.models.accessMode }}
  # ReadOnlyMany requires a storage class that supports multi-node reads.
  # On EKS: use "efs-sc" (AWS EFS CSI driver) instead of the default "gp3".
  # On local clusters (k3d / kind): use "standard" with accessMode: ReadWriteOnce.
  #   Override: --set persistence.storageClass=efs-sc
  #             --set persistence.models.storageClass=efs-sc  (if added to values)
  storageClassName: {{ default .Values.persistence.storageClass .Values.persistence.models.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.models.size }}
