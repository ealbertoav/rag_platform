apiVersion: v1
kind: Service
metadata:
  name: {{ include "rag-platform.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "rag-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{ include "rag-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
