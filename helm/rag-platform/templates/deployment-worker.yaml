apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rag-platform.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "rag-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.replicaCount.worker }}
  selector:
    matchLabels:
      {{ include "rag-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{ include "rag-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: {{ include "rag-platform.serviceAccountName" . }}
      containers:
        - name: worker
          image: "{{ .Values.image.worker.repository }}:{{ .Values.image.worker.tag }}"
          imagePullPolicy: {{ .Values.image.worker.pullPolicy }}
          # Default CMD from Dockerfile.worker: ingest /app/data/raw.
          # For queue-based production ingestion override this via values:
          #   command: ["python", "scripts/ingest.py", "--source", "/app/data/raw"]
          envFrom:
            - configMapRef:
                name: {{ include "rag-platform.fullname" . }}-config
            - secretRef:
                name: {{ include "rag-platform.fullname" . }}-secret
          resources:
            {{ toYaml .Values.resources.worker | nindent 12 }}
          volumeMounts:
            - name: models
              mountPath: /app/models
              readOnly: true
            - name: data
              mountPath: /app/data
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: {{ include "rag-platform.fullname" . }}-models
        - name: data
          emptyDir: {}
      {{- with .Values.scheduling.worker.nodeSelector }}
      nodeSelector:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduling.worker.affinity }}
      affinity:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduling.worker.tolerations }}
      tolerations:
        {{ toYaml . | nindent 8 }}
      {{- end }}
