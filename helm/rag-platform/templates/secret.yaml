apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rag-platform.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "rag-platform.labels" . | nindent 4 }}
type: Opaque
# Sensitive values — base64-encoded as required by K8s Secrets.
# In production supply these via --set or a sealed-secrets / external-secrets operator,
# never committed to values.yaml in plaintext.
data:
  QDRANT__API_KEY: {{ .Values.secret.qdrantApiKey | b64enc | quote }}
